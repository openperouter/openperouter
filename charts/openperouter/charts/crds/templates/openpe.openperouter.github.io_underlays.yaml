---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: underlays.openpe.openperouter.github.io
spec:
  group: openpe.openperouter.github.io
  names:
    kind: Underlay
    listKind: UnderlayList
    plural: underlays
    singular: underlay
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Underlay is the Schema for the underlays API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: UnderlaySpec defines the desired state of Underlay.
            properties:
              asn:
                description: ASN is the local AS number to use for the session with
                  the TOR switch.
                format: int32
                maximum: 4294967295
                minimum: 1
                type: integer
              evpn:
                description: EVPNConfig contains EVPN-VXLAN configuration for the
                  underlay.
                properties:
                  vtepInterface:
                    description: |-
                      VTEPInterface is the name of an existing interface to use as the VTEP source.
                      The interface must already have an IP address configured that will be used
                      as the VTEP IP. Mutually exclusive with vtepcidr.
                      The ToR must advertise the interface IP into the fabric underlay
                      (e.g. via redistribute connected) so that the VTEP address is reachable
                      from other leaves.
                    maxLength: 15
                    pattern: ^[a-zA-Z][a-zA-Z0-9._-]*$
                    type: string
                  vtepcidr:
                    description: |-
                      VTEPCIDR is CIDR to be used to assign IPs to the local VTEP on each node.
                      A loopback interface will be created with an IP derived from this CIDR.
                      Mutually exclusive with vtepInterface.
                    type: string
                type: object
                x-kubernetes-validations:
                - message: exactly one of vtepcidr or vtepInterface must be specified
                  rule: (self.?vtepcidr.orValue("") != "") != (self.?vtepInterface.orValue("")
                    != "")
              isis:
                description: ISIS holds the ISIS configuration for the underlay.
                properties:
                  baseNet:
                    description: |-
                      BaseNet holds the ISIS net address.
                      The configured Net address is a base address which is offset by the node index of each node.
                    maxLength: 25
                    minLength: 25
                    type: string
                    x-kubernetes-validations:
                    - message: Provided net address must match canonical format
                      rule: self.matches('^[0-9a-f]{2}\\.([0-9a-f]{4}\\.){4}[0-9a-f]{2}$')
                  interfaces:
                    description: |-
                      Interfaces holds additional ISIS interface level configuration and / or per
                      interface overrides. By default, OpenPERouter enables IPv6 on all required
                      interfaces with default settings.
                    items:
                      description: ISISInterface holds ISIS interface level configuration.
                      properties:
                        ipv4:
                          description: ipv4 isis <name> enabled
                          type: boolean
                        ipv6:
                          description: ipv6 isis <name> enabled
                          type: boolean
                        name:
                          description: Name of the interface that these settings shall
                            apply to.
                          maxLength: 15
                          minLength: 1
                          type: string
                          x-kubernetes-validations:
                          - message: Interface must not contain /, :, or whitespace
                            rule: self.matches('^[^\\/:\\s]+$')
                          - message: Interface cannot be . or ..
                            rule: self != '.' && self != '..'
                      required:
                      - name
                      type: object
                    maxItems: 1000
                    type: array
                  level:
                    description: Level configures the ISIS type, system wide. It defaults
                      to level-1-2 unless specified otherwise.
                    enum:
                    - 1
                    - 2
                    format: int32
                    type: integer
                required:
                - baseNet
                type: object
              neighbors:
                description: Neighbors is the list of external neighbors to peer with.
                items:
                  description: Neighbor represents a BGP Neighbor we want FRR to connect
                    to.
                  properties:
                    address:
                      description: Address is the IP address to establish the session
                        with.
                      type: string
                    asn:
                      description: ASN is the AS number of the neighbor. Either ASN
                        or Type must be set.
                      format: int32
                      maximum: 4294967295
                      minimum: 1
                      type: integer
                    bfd:
                      description: BFD defines the BFD configuration for the BGP session.
                      properties:
                        detectMultiplier:
                          description: |-
                            Configures the detection multiplier to determine
                            packet loss. The remote transmission interval will be multiplied
                            by this value to determine the connection loss detection timer.
                          format: int32
                          maximum: 255
                          minimum: 2
                          type: integer
                        echoInterval:
                          description: |-
                            Configures the minimal echo receive transmission
                            interval that this system is capable of handling in milliseconds.
                            Defaults to 50ms
                          format: int32
                          maximum: 60000
                          minimum: 10
                          type: integer
                        echoMode:
                          description: |-
                            Enables or disables the echo transmission mode.
                            This mode is disabled by default, and not supported on multi
                            hops setups.
                          type: boolean
                        minimumTtl:
                          description: |-
                            For multi hop sessions only: configure the minimum
                            expected TTL for an incoming BFD control packet.
                          format: int32
                          maximum: 254
                          minimum: 1
                          type: integer
                        passiveMode:
                          description: |-
                            Mark session as passive: a passive session will not
                            attempt to start the connection and will wait for control packets
                            from peer before it begins replying.
                          type: boolean
                        receiveInterval:
                          description: |-
                            The minimum interval that this system is capable of
                            receiving control packets in milliseconds.
                            Defaults to 300ms.
                          format: int32
                          maximum: 60000
                          minimum: 10
                          type: integer
                        transmitInterval:
                          description: |-
                            The minimum transmission interval (less jitter)
                            that this system wants to use to send BFD control packets in
                            milliseconds. Defaults to 300ms
                          format: int32
                          maximum: 60000
                          minimum: 10
                          type: integer
                      type: object
                    connectTime:
                      description: Requested BGP connect time, controls how long BGP
                        waits between connection attempts to a neighbor.
                      type: string
                      x-kubernetes-validations:
                      - message: connect time should be between 1 seconds to 65535
                        rule: duration(self).getSeconds() >= 1 && duration(self).getSeconds()
                          <= 65535
                      - message: connect time should contain a whole number of seconds
                        rule: duration(self).getMilliseconds() % 1000 == 0
                    ebgpMultiHop:
                      description: EBGPMultiHop indicates if the BGPPeer is multi-hops
                        away.
                      type: boolean
                    holdTime:
                      description: |-
                        HoldTime is the requested BGP hold time, per RFC4271.
                        Defaults to 180s.
                      type: string
                    keepaliveTime:
                      description: |-
                        KeepaliveTime is the requested BGP keepalive time, per RFC4271.
                        Defaults to 60s.
                      type: string
                    password:
                      description: |-
                        Password to be used for establishing the BGP session.
                        Password and PasswordSecret are mutually exclusive.
                      type: string
                    passwordSecret:
                      description: |-
                        PasswordSecret is name of the authentication secret for the neighbor.
                        the secret must be of type "kubernetes.io/basic-auth", and created in the
                        same namespace as the perouter daemon. The password is stored in the
                        secret as the key "password".
                        Password and PasswordSecret are mutually exclusive.
                      type: string
                    port:
                      description: |-
                        Port is the port to dial when establishing the session.
                        Defaults to 179.
                      maximum: 16384
                      minimum: 0
                      type: integer
                    type:
                      description: Type is the AS type of the neighbor. Either ASN
                        or Type must be set.
                      enum:
                      - external
                      - internal
                      type: string
                  required:
                  - address
                  type: object
                  x-kubernetes-validations:
                  - message: either ASN or Type must be set
                    rule: has(self.asn) || has(self.type)
                  - message: ASN and Type cannot be set together
                    rule: '!has(self.asn) || !has(self.type)'
                minItems: 1
                type: array
              nics:
                description: |-
                  Nics is the list of physical nics to move under the PERouter namespace to connect
                  to external routers. This field is optional when using Multus networks for TOR connectivity.
                items:
                  maxLength: 15
                  pattern: ^[a-zA-Z][a-zA-Z0-9._-]*$
                  type: string
                type: array
              nodeSelector:
                description: |-
                  NodeSelector specifies which nodes this Underlay applies to.
                  If empty or not specified, applies to all nodes (backward compatible).
                  Multiple Underlays with overlapping node selectors will be rejected.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              routeridcidr:
                default: 10.0.0.0/24
                description: RouterIDCIDR is the ipv4 cidr to be used to assign a
                  different routerID on each node.
                type: string
              srv6:
                description: SRV6 holds the SRV6 configuration.
                properties:
                  locator:
                    description: Locator defines the locator for this SRV6 VPN.
                    properties:
                      basePrefix:
                        description: BasePrefix is the CIDR to be used for the locator,
                          offset by the router index.
                        maxLength: 43
                        minLength: 1
                        type: string
                        x-kubernetes-validations:
                        - message: prefix must be an IPv6 CIDR
                          rule: isCIDR(self) && cidr(self).ip().family() == 6
                      format:
                        description: Format specifies the format of the locator. Defaults
                          to usid-f3216
                        maxLength: 40
                        minLength: 1
                        type: string
                    required:
                    - basePrefix
                    type: object
                  source:
                    description: Source specifies the source for the SRV6 VPN.
                    properties:
                      cidr:
                        description: |-
                          CIDR to assign IPs to the local VTEP on each node from.
                          The IPv6 address will be assigned to the loopback interface.
                          Mutually exclusive with interface.
                        maxLength: 43
                        minLength: 1
                        type: string
                        x-kubernetes-validations:
                        - message: cidr must be an IPv6 CIDR
                          rule: isCIDR(self) && cidr(self).ip().family() == 6
                      interface:
                        description: |-
                          Interface is the name of an existing interface to use as the VTEP source.
                          The interface must already have an IP address configured that will be used
                          as the VTEP IP. Mutually exclusive with cidr.
                          The ToR must advertise the interface IP into the fabric underlay
                          (e.g. via redistribute connected) so that the VTEP address is reachable
                          from other leaves.
                        maxLength: 15
                        minLength: 1
                        type: string
                        x-kubernetes-validations:
                        - message: interface must not contain /, :, or whitespace
                          rule: self.matches('^[^\\/:\\s]+$')
                        - message: interface cannot be . or ..
                          rule: self != '.' && self != '..'
                    type: object
                    x-kubernetes-validations:
                    - message: exactly one of cidr or interface must be specified
                      rule: has(self.cidr) != has(self.interface)
                required:
                - locator
                - source
                type: object
            required:
            - asn
            type: object
            x-kubernetes-validations:
            - message: SRv6 can only be configured if ISIS is set
              rule: '!has(self.srv6) || has(self.isis)'
          status:
            description: UnderlayStatus defines the observed state of Underlay.
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
