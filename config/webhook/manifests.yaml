---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-openperouter-io-v1alpha1-underlay
  failurePolicy: Fail
  name: underlayvalidationwebhook.openperouter.io
  rules:
  - apiGroups:
    - openpe.openperouter.github.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - underlays
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-openperouter-io-v1alpha1-vni
  failurePolicy: Fail
  name: vnivalidationwebhook.openperouter.io
  rules:
  - apiGroups:
    - openpe.openperouter.github.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - vnis
  sideEffects: None
