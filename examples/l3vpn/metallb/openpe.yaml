apiVersion: openpe.openperouter.github.io/v1alpha1
kind: L3VPN
metadata:
  name: red
  namespace: openperouter-system
spec:
  hostsession:
    asn: 64514
    hostasn: 64515
    localcidr:
      ipv4: 192.169.10.0/24
  vrf: red
  routeDistinguisherSuffix: 100
  routeTarget: "64514:100"
---
apiVersion: openpe.openperouter.github.io/v1alpha1
kind: L3VPN
metadata:
  name: blue
  namespace: openperouter-system
spec:
  hostsession:
    asn: 64514
    hostasn: 64515
    localcidr:
      ipv4: 192.169.11.0/24
  routeDistinguisherSuffix: 200
  routeTarget: "64514:200"
  vrf: blue
---
apiVersion: openpe.openperouter.github.io/v1alpha1
kind: Underlay
metadata:
  name: underlay
  namespace: openperouter-system
spec:
  asn: 64514
  neighbors:
  - address: 2001:db8:1234::1
    asn: 64520
    ebgpMultiHop: true
  - address: 2001:db8:1234::2
    asn: 64520
    ebgpMultiHop: true
  nics:
  - toswitch
  routeridcidr: 10.0.0.0/24
  isis:
  - name: "ISIS"
    net:
    - "49.0001.0002.0003.0004.00"
    type: 1
    interfaces:
    - name: "toswitch"
      ipv6: true
  srv6:
    source:
      cidr: "2001:db8:1234:5678::/64"
    locator:
      name: "MAIN"
      prefix: "fd00:0:32::/48"
      format: "usid-f3216"
