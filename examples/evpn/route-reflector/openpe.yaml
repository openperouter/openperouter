---
# The control-plane node runs as a pure BGP route reflector (RFC 4456): no
# tunnel endpoint, it does not participate in the data plane. It accepts
# dynamic iBGP sessions from the client nodes over the listen range and
# reflects both ipv4 unicast (VTEP reachability) and evpn (type-2/type-3)
# routes between them, so the clients don't need a full iBGP mesh nor the
# ToR fabric to exchange EVPN routes.
apiVersion: openpe.openperouter.github.io/v1alpha1
kind: Underlay
metadata:
  name: route-reflector
  namespace: openperouter-system
spec:
  asn: 64514
  interfaces:
    - type: NetworkDevice
      networkDevice:
        interfaceName: toswitch1
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
  routeReflector:
    clusterID: 192.0.2.1
  neighbors:
    - type: internal
      listenRange: 192.168.11.0/24
      addressFamilies:
        - type: ipv4unicast
          properties:
            - type: routeReflectorClient
        - type: evpn
          properties:
            - type: routeReflectorClient
---
# The worker nodes are route reflector clients: a normal data-plane underlay
# whose only BGP session is the internal (iBGP) one to the route reflector.
apiVersion: openpe.openperouter.github.io/v1alpha1
kind: Underlay
metadata:
  name: client
  namespace: openperouter-system
spec:
  asn: 64514
  interfaces:
    - type: NetworkDevice
      networkDevice:
        interfaceName: toswitch1
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: DoesNotExist
  tunnelEndpoint:
    cidrs:
      - 100.65.0.0/24
  neighbors:
    - type: internal
      address: 192.168.11.3  # the route reflector on the leafkind1 switch subnet
---
# A disconnected L2VNI (no VRF) stretched between the client nodes. Its
# type-2/type-3 routes are only distributed through the route reflector.
# The node selector keeps it off the route reflector node, which has no
# tunnel endpoint.
apiVersion: openpe.openperouter.github.io/v1alpha1
kind: L2VNI
metadata:
  name: reflected
  namespace: openperouter-system
spec:
  vni: 300
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: DoesNotExist
  hostmaster:
    type: linux-bridge
    linuxBridge:
      autoCreate: true
