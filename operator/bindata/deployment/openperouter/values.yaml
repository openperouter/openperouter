# Default values for openperouter.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

nameOverride: ""
fullnameOverride: ""

rbac:
  # create specifies whether to install and use RBAC rules.
  create: true

openperouter:
  # -- Controller log level. Must be one of: `debug`, `info`, `warn` or `error`.
  logLevel: info
  tolerateMaster: true
  # -- If true, all pods (router, controller, and nodemarker) are allowed to run on master/control-plane nodes
  runOnMaster: true
  # -- If true, enables host mode deployment: deploys hostbridge DaemonSet instead of router and controller,
  # and configures nodemarker to run in webhook-only mode
  hostmode: false
  # -- Host directory used by libcni to cache the results of the CNI
  # invocations for the underlay interfaces. It must outlive the controller
  # pod so CNI DEL keeps working across restarts and upgrades; living under
  # /var/run, it is cleared on reboot together with the router netns. It must
  # be dedicated to openperouter: do not point it at another CNI runtime's
  # cache dir (e.g. /var/lib/cni), whose garbage collection could purge the
  # cached attachments.
  cniCacheDir: "/var/run/openperouter/cni-cache"
  image:
    repository: quay.io/openperouter/router
    tag: ""
    pullPolicy: ""
  ## ref: https://kubernetes.io/docs/tasks/manage-daemon/update-daemon-set/
  ##
  updateStrategy:
    ## StrategyType
    ## Can be set to RollingUpdate or OnDelete
    ##
    type: RollingUpdate
  serviceAccounts:
    # Specifies whether the ServiceAccounts should be created
    create: true
    # The names of the ServiceAccounts to use. If not set and create is
    # true, a name is generated using the fullname template
    controller:
      name: ""
    perouter:
      name: ""
    annotations: {}
  tolerations: []
  priorityClassName: ""
  affinity: {}
  ## Selects which runtime class will be used by the pod.
  runtimeClassName: ""
  podAnnotations: {}
  labels: {}
  controller:
    resources: {}
    # -- Health probe port for liveness and readiness checks
    healthProbePort: 9081
  nodemarker:
    resources: {}
  # frr contains configuration specific to the perouter FRR container,
  frr:
    image:
      repository: quay.io/openperouter/openperouter
      tag: ""
      pullPolicy: ""
    resources: {}
    reloader:
      resources: {}
      # -- Timeout for vtysh commands used in health checks. Increase under heavy VNI load. Defaults to 10s.
      vtyshTimeout: ""
  cri: "containerd" # cri to bind its socket, can be containerd or crio.
  # -- OVS database socket path. Defaults to standard OVS location if not specified.
  ovsSocketPath: ""
  # -- OVS run directory to mount. This is the directory containing the OVS socket.
  ovsRunDir: "/var/run/openvswitch"

webhook:
  enabled: true

crds:
  enabled: true
  validationFailurePolicy: Fail
