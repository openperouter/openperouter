apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  creationTimestamp: null
  name: l3vpns.openpe.openperouter.github.io
spec:
  group: openpe.openperouter.github.io
  names:
    kind: L3VPN
    listKind: L3VPNList
    plural: l3vpns
    singular: l3vpn
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          L3VPN represents a VXLan L3VPN to receive EVPN type 5 routes
          from.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: L3VPNSpec defines the desired state of L3VPN.
            properties:
              exportRTs:
                description: ExportRTs are the Route Targets to be used for exporting
                  routes.
                items:
                  description: RouteTarget defines a BGP Extended Community for route
                    filtering.
                  maxLength: 26
                  type: string
                  x-kubernetes-validations:
                  - message: routeTarget must be in ASN:NN or IP:NN format
                    rule: self.matches('^([0-9]{1,10}:[0-9]{1,10}|[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}:[0-9]{1,10})$')
                maxItems: 100
                type: array
              hostsession:
                description: HostSession is the configuration for the host session.
                properties:
                  asn:
                    description: |-
                      ASN is the local AS number to use to establish a BGP session with
                      the default namespace.
                    format: int32
                    maximum: 4294967295
                    minimum: 1
                    type: integer
                  hostasn:
                    description: |-
                      HostASN is the expected AS number for a BGP speaking component running in
                      the default network namespace. Either HostASN or HostType must be set.
                    format: int32
                    maximum: 4294967295
                    minimum: 1
                    type: integer
                  hosttype:
                    description: |-
                      HostType is the AS type of the BGP speaking component running in the
                      default network namespace. Either HostASN or HostType must be set.
                    enum:
                    - external
                    - internal
                    type: string
                  localcidr:
                    description: |-
                      LocalCIDR is the CIDR configuration for the veth pair
                      to connect with the default namespace. The interface under
                      the PERouter side is going to use the first IP of the cidr on all the nodes.
                      At least one of IPv4 or IPv6 must be provided.
                    properties:
                      ipv4:
                        description: |-
                          IPv4 is the IPv4 CIDR to be used for the veth pair
                          to connect with the default namespace. The interface under
                          the PERouter side is going to use the first IP of the cidr on all the nodes.
                        type: string
                      ipv6:
                        description: |-
                          IPv6 is the IPv6 CIDR to be used for the veth pair
                          to connect with the default namespace. The interface under
                          the PERouter side is going to use the first IP of the cidr on all the nodes.
                        type: string
                    type: object
                    x-kubernetes-validations:
                    - message: LocalCIDR can't be changed
                      rule: self == oldSelf
                required:
                - asn
                - localcidr
                type: object
                x-kubernetes-validations:
                - message: either HostASN or HostType must be set
                  rule: has(self.hostasn) || has(self.hosttype)
                - message: HostASN and HostType cannot be set together
                  rule: '!has(self.hostasn) || !has(self.hosttype)'
              importRTs:
                description: ImportRTs are the Route Targets to be used for importing
                  routes.
                items:
                  description: RouteTarget defines a BGP Extended Community for route
                    filtering.
                  maxLength: 26
                  type: string
                  x-kubernetes-validations:
                  - message: routeTarget must be in ASN:NN or IP:NN format
                    rule: self.matches('^([0-9]{1,10}:[0-9]{1,10}|[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}:[0-9]{1,10})$')
                maxItems: 100
                type: array
              nodeSelector:
                description: |-
                  NodeSelector specifies which nodes this L3VPN applies to.
                  If empty or not specified, applies to all nodes.
                  Multiple L3VPNs can match the same node.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              rdAssignedNumber:
                description: |-
                  RDAssignedNumber sets the Route Distinguisher's Assigned Number subfield.
                  The Administrator subfield is automatically set to the value of the router
                  ID. OpenPERouter uses Type 1 Route Distinguishers as defined in RFC4364.
                format: int32
                maximum: 4294967295
                minimum: 0
                type: integer
              vrf:
                description: VRF is the name of the linux VRF to be used inside the
                  PERouter namespace.
                maxLength: 15
                pattern: ^[a-zA-Z][a-zA-Z0-9_-]*$
                type: string
            required:
            - vrf
            type: object
            x-kubernetes-validations:
            - message: hostASN must be different from asn
              rule: '!has(self.hostsession) || self.hostsession.hostasn != self.hostsession.asn'
          status:
            description: L3VPNStatus defines the observed state of L3VPN.
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: null
  storedVersions: null
