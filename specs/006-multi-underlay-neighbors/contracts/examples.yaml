# Underlay Configuration Examples
#
# This file provides comprehensive examples for configuring the Underlay CRD
# with support for multiple interfaces and multiple BGP neighbors.
#
# VALIDATION REQUIREMENTS:
# - At least one neighbor MUST be configured
# - At least one NIC MUST be configured (unless using Multus)
# - Neighbor addresses MUST be unique within an Underlay
# - NIC names MUST be unique within an Underlay
# - Local ASN MUST differ from all neighbor ASNs
# - Either vtepcidr OR vtepInterface must be specified (not both, not neither)
# - Only one Underlay applies per node (use nodeSelector for multi-node)

# ============================================================================
# Example 1: Single Interface, Single Neighbor (Backward Compatible)
# ============================================================================
# Use Case: Simple deployment with one ToR switch and one connection
# - Minimal configuration for basic BGP peering
# - Backward compatible with legacy deployments
# - Single point of failure (no redundancy)
---
apiVersion: openpe.openperouter.github.io/v1alpha1
kind: Underlay
metadata:
  name: underlay-single
  namespace: openperouter-system
spec:
  # Local ASN for this node's BGP router
  asn: 64514

  # Optional: CIDR for auto-assigning router IDs per node
  routeridcidr: "10.0.0.0/24"

  # Single neighbor configuration - ToR switch
  neighbors:
  - asn: 64512           # ToR ASN (must differ from local ASN)
    address: "192.168.11.2"

  # Single physical interface to move to router namespace
  nics:
  - "toswitch"

  # EVPN configuration - auto-allocate VTEP IPs
  evpn:
    vtepcidr: "100.65.0.0/24"

---
# ============================================================================
# Example 2: Multiple Interfaces, Single Neighbor (Link Aggregation)
# ============================================================================
# Use Case: Single ToR with multiple physical connections for bandwidth/redundancy
# - Multiple NICs provide link aggregation or failover
# - All interfaces connect to the same ToR switch
# - BGP session runs over all interfaces (any-to-any connectivity)
---
apiVersion: openpe.openperouter.github.io/v1alpha1
kind: Underlay
metadata:
  name: underlay-multi-nic
  namespace: openperouter-system
spec:
  # Target only nodes in specific rack
  nodeSelector:
    matchLabels:
      topology.kubernetes.io/zone: "rack-a"

  asn: 64514
  routeridcidr: "10.0.1.0/24"

  # Single ToR neighbor
  neighbors:
  - asn: 64512
    address: "192.168.11.2"
    # Enable BFD for fast failure detection
    bfd:
      receiveInterval: 300
      transmitInterval: 300
      detectMultiplier: 3

  # Multiple physical interfaces for bandwidth/redundancy
  nics:
  - "eth1"     # Primary interface
  - "eth2"     # Secondary interface
  - "eth3"     # Tertiary interface

  # Use existing interface for VTEP (e.g., one of the NICs)
  evpn:
    vtepInterface: "eth1"

---
# ============================================================================
# Example 3: Single Interface, Multiple Neighbors (Multi-ToR Peering)
# ============================================================================
# Use Case: Connect to multiple ToR switches for redundancy
# - Multiple BGP sessions over shared physical interface
# - Typical dual-ToR datacenter deployment
# - Provides ToR-level redundancy without requiring multiple NICs
---
apiVersion: openpe.openperouter.github.io/v1alpha1
kind: Underlay
metadata:
  name: underlay-multi-neighbor
  namespace: openperouter-system
spec:
  asn: 64514

  # Four BGP neighbors - dual ToRs with dual sessions each
  neighbors:
  # ToR-1 primary session
  - asn: 64512
    address: "192.168.11.2"
    holdTime: "180s"
    keepaliveTime: "60s"

  # ToR-1 secondary session (different IP, same ASN)
  - asn: 64512
    address: "192.168.11.3"
    holdTime: "180s"
    keepaliveTime: "60s"

  # ToR-2 primary session
  - asn: 64513
    address: "192.168.12.2"
    holdTime: "180s"
    keepaliveTime: "60s"

  # ToR-2 secondary session
  - asn: 64513
    address: "192.168.12.3"
    holdTime: "180s"
    keepaliveTime: "60s"

  # Single shared interface for all sessions
  nics:
  - "toswitch"

  evpn:
    vtepcidr: "100.65.0.0/24"

---
# ============================================================================
# Example 4: Multiple Interfaces AND Multiple Neighbors (Production Setup)
# ============================================================================
# Use Case: Full redundancy with multiple NICs and multiple ToRs
# - Realistic production deployment
# - Each ToR has dedicated NICs
# - Provides both NIC-level and ToR-level redundancy
# - Matches the E2E test topology configuration
---
apiVersion: openpe.openperouter.github.io/v1alpha1
kind: Underlay
metadata:
  name: underlay-production
  namespace: openperouter-system
spec:
  # Optional: Target specific nodes (e.g., edge workers)
  nodeSelector:
    matchLabels:
      node-role.kubernetes.io/worker: ""

  asn: 64514
  routeridcidr: "10.0.2.0/24"

  # Multiple neighbors across multiple ToRs
  neighbors:
  # ToR-1 (AS 64512) - two BGP sessions
  - asn: 64512
    address: "192.168.11.2"
    bfd:
      receiveInterval: 300
      transmitInterval: 300
      detectMultiplier: 3

  - asn: 64512
    address: "192.168.11.3"
    bfd:
      receiveInterval: 300
      transmitInterval: 300
      detectMultiplier: 3

  # ToR-2 (AS 64513) - two BGP sessions
  - asn: 64513
    address: "192.168.12.2"
    bfd:
      receiveInterval: 300
      transmitInterval: 300
      detectMultiplier: 3

  - asn: 64513
    address: "192.168.12.3"
    bfd:
      receiveInterval: 300
      transmitInterval: 300
      detectMultiplier: 3

  # Multiple interfaces - dedicated paths to each ToR
  nics:
  - "toswitch"    # Primary interface to ToR-1
  - "toswitch2"   # Primary interface to ToR-2

  evpn:
    vtepcidr: "100.65.0.0/24"

---
# ============================================================================
# Example 5: Invalid - Duplicate Neighbor Address (REJECTED)
# ============================================================================
# This example WILL BE REJECTED by the webhook validator
# Reason: Duplicate neighbor addresses are not allowed
---
apiVersion: openpe.openperouter.github.io/v1alpha1
kind: Underlay
metadata:
  name: underlay-invalid-duplicate-neighbor
  namespace: openperouter-system
spec:
  asn: 64514

  neighbors:
  - asn: 64512
    address: "192.168.11.2"
  - asn: 64513
    address: "192.168.11.2"  # ERROR: Duplicate address!

  nics:
  - "toswitch"

  evpn:
    vtepcidr: "100.65.0.0/24"

---
# ============================================================================
# Example 6: Invalid - Duplicate NIC Name (REJECTED)
# ============================================================================
# This example WILL BE REJECTED by the webhook validator
# Reason: Duplicate NIC names are not allowed
---
apiVersion: openpe.openperouter.github.io/v1alpha1
kind: Underlay
metadata:
  name: underlay-invalid-duplicate-nic
  namespace: openperouter-system
spec:
  asn: 64514

  neighbors:
  - asn: 64512
    address: "192.168.11.2"

  nics:
  - "toswitch"
  - "eth1"
  - "toswitch"  # ERROR: Duplicate NIC name!

  evpn:
    vtepcidr: "100.65.0.0/24"

---
# ============================================================================
# Example 7: Invalid - Local ASN Equals Neighbor ASN (REJECTED)
# ============================================================================
# This example WILL BE REJECTED by the webhook validator
# Reason: Local ASN must differ from all neighbor ASNs (eBGP only)
---
apiVersion: openpe.openperouter.github.io/v1alpha1
kind: Underlay
metadata:
  name: underlay-invalid-asn-conflict
  namespace: openperouter-system
spec:
  asn: 64514  # Local ASN

  neighbors:
  - asn: 64514  # ERROR: Same as local ASN (iBGP not supported)
    address: "192.168.11.2"

  nics:
  - "toswitch"

  evpn:
    vtepcidr: "100.65.0.0/24"

---
# ============================================================================
# Example 8: Invalid - No Neighbors (REJECTED)
# ============================================================================
# This example WILL BE REJECTED by the webhook validator
