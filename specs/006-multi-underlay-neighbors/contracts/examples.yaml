---
apiVersion: openpe.openperouter.github.io/v1alpha1
kind: Underlay
metadata:
  name: underlay-invalid-no-neighbors
  namespace: openperouter-system
spec:
  asn: 64514

  neighbors: []  # ERROR: Empty neighbors list

  nics:
  - "toswitch"

  evpn:
    vtepcidr: "100.65.0.0/24"

---
# ============================================================================
# Example 9: Invalid - No NICs (REJECTED if not using Multus)
# ============================================================================
# This example WILL BE REJECTED by the webhook validator
# Reason: At least one NIC is required (unless using Multus)
---
apiVersion: openpe.openperouter.github.io/v1alpha1
kind: Underlay
metadata:
  name: underlay-invalid-no-nics
  namespace: openperouter-system
spec:
  asn: 64514

  neighbors:
  - asn: 64512
    address: "192.168.11.2"

  nics: []  # ERROR: Empty NICs list (use Multus annotation if no physical NICs)

  evpn:
    vtepcidr: "100.65.0.0/24"

---
# ============================================================================
# Example 10: Migration Path - Adding Neighbors and Interfaces
# ============================================================================
# Use Case: Incrementally upgrade from single to multi configuration
# - Start with minimal single-neighbor/single-NIC config
# - Add neighbors and NICs over time without downtime
# - New neighbors/NICs are hot-applied (no router restart)
---
# STEP 1: Initial minimal configuration
apiVersion: openpe.openperouter.github.io/v1alpha1
kind: Underlay
metadata:
  name: underlay-evolution
  namespace: openperouter-system
spec:
  asn: 64514

  neighbors:
  - asn: 64512
    address: "192.168.11.2"

  nics:
  - "toswitch"

  evpn:
    vtepcidr: "100.65.0.0/24"

# STEP 2: Add second ToR neighbor (apply with kubectl apply)
# The controller will hot-apply this change without restarting the router
#
# spec:
#   asn: 64514
#   neighbors:
#   - asn: 64512
#     address: "192.168.11.2"  # Existing
#   - asn: 64513
#     address: "192.168.12.2"  # NEW: Added
#   nics:
#   - "toswitch"

# STEP 3: Add second NIC for redundancy (apply with kubectl apply)
# The controller will hot-apply this change without restarting the router
#
# spec:
#   asn: 64514
#   neighbors:
#   - asn: 64512
#     address: "192.168.11.2"
#   - asn: 64513
#     address: "192.168.12.2"
#   nics:
#   - "toswitch"   # Existing
#   - "toswitch2"  # NEW: Added

---
# ============================================================================
# Example 11: Advanced - eBGP Multihop with BFD
# ============================================================================
# Use Case: BGP neighbors not directly connected (spine-leaf topology)
# - Neighbors multiple hops away
# - BFD for fast failure detection
# - Different hold/keepalive timers per neighbor
---
apiVersion: openpe.openperouter.github.io/v1alpha1
kind: Underlay
metadata:
  name: underlay-multihop
  namespace: openperouter-system
spec:
  asn: 64514

  neighbors:
  # Spine-1 (2 hops away)
  - asn: 64500
    address: "10.0.1.1"
    ebgpMultiHop: true
    holdTime: "90s"
    keepaliveTime: "30s"
    bfd:
      receiveInterval: 500
      transmitInterval: 500
      detectMultiplier: 3

  # Spine-2 (2 hops away)
  - asn: 64500
    address: "10.0.1.2"
    ebgpMultiHop: true
    holdTime: "90s"
    keepaliveTime: "30s"
    bfd:
      receiveInterval: 500
      transmitInterval: 500
      detectMultiplier: 3

  nics:
  - "eth0"

  evpn:
    vtepcidr: "100.65.0.0/24"

---
# ============================================================================
# Example 12: Advanced - BGP Authentication
# ============================================================================
# Use Case: Secure BGP sessions with MD5 authentication
# - Password-protected BGP sessions
# - Mix of authenticated and non-authenticated neighbors
---
apiVersion: openpe.openperouter.github.io/v1alpha1
kind: Underlay
metadata:
  name: underlay-auth
  namespace: openperouter-system
spec:
  asn: 64514

  neighbors:
  # Neighbor with password authentication
  - asn: 64512
    address: "192.168.11.2"
    password: "secure-bgp-password-tor1"

  # Neighbor with secret-based authentication (recommended)
  - asn: 64513
    address: "192.168.12.2"
    passwordSecret: "bgp-tor2-secret"  # Reference to k8s secret

  # Neighbor without authentication
  - asn: 64515
    address: "192.168.13.2"

  nics:
  - "toswitch"

  evpn:
    vtepcidr: "100.65.0.0/24"
