log file /etc/frr/frr.log debug

debug zebra events
debug zebra vxlan
debug bgp zebra
debug zebra events
debug zebra nht
debug zebra kernel
debug zebra rib
debug zebra nexthop
debug bgp neighbor-events
debug bgp updates
debug bgp keepalives
debug bgp nht
debug bgp zebra
debug bfd network
debug bfd peer
debug bfd zebra

router bgp 64513
 no bgp ebgp-requires-policy
 ! Allow BGP to advertise routes not yet present in the local RIB,
 ! needed for routes learned via EVPN or other protocols.
 no bgp network import-check
 no bgp default ipv4-unicast

 neighbor 192.168.1.6 remote-as 64612
 neighbor 192.168.12.3 remote-as 64514
 neighbor 192.168.12.4 remote-as 64514

 !
 address-family ipv4 unicast
  neighbor 192.168.1.6 activate
  neighbor 192.168.12.3 activate
  neighbor 192.168.12.4 activate
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor 192.168.1.6 activate
  neighbor 192.168.12.3 activate
  neighbor 192.168.12.4 activate
  advertise-all-vni
  advertise-svi-ip
 exit-address-family
exit
!
