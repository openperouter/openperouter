interfaces:
- left:
    bridge: "leafkind-switch"
    name: "kindctrlpl"
  right:
    container: "pe-kind-control-plane"
    name: "toswitch"
    ips: ["192.168.11.3/24", "2001:db8:11::3/64"]
- left:
    bridge: "leafkind-switch"
    name: "kindworker"
  right:
    container: "pe-kind-worker"
    name: "toswitch"
    ips: ["192.168.11.4/24", "2001:db8:11::4/64"]
# Point to point links for IPv6 unnumbered BGP sessions.
- left:
    container: "clab-kind-leafkind"
    name: "tokindworker"
  right:
    container: "pe-kind-worker"
    name: "toleafkind"
- left:
    container: "clab-kind-leafkind"
    name: "tokindctrlpl"
  right:
    container: "pe-kind-control-plane"
    name: "toleafkind"
